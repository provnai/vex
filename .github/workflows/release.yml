name: Release

on:
  release:
    types: [published]

env:
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    # Order strictly follows the dependency graph (leaves first)
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Hardware Dependencies
        run: sudo apt-get update && sudo apt-get install -y libtss2-dev pkg-config

      # Layer 0: Fully standalone (no internal VEX deps)
      - name: Publish vex-macros
        run: cargo publish -p vex-macros || echo "Already published or error, continuing..."
      - run: sleep 30

      - name: Publish vex-algoswitch
        run: cargo publish -p vex-algoswitch || echo "Already published or error, continuing..."
      - run: sleep 30

      - name: Publish vex-queue
        run: cargo publish -p vex-queue || echo "Already published or error, continuing..."
      - run: sleep 30

      - name: Publish vex-hardware
        run: cargo publish -p vex-hardware || echo "Already published or error, continuing..."
      - run: sleep 30

      # Layer 1: Depends only on Layer 0
      # vex-core optionally depends on vex-algoswitch (already published above)
      - name: Publish vex-core
        run: cargo publish -p vex-core || echo "Already published or error, continuing..."
      - run: sleep 30

      - name: Publish vex-chora
        run: cargo publish -p vex-chora || echo "Already published or error, continuing..."
      - run: sleep 30

      # Layer 2: Depends on vex-core
      - name: Publish vex-llm
        run: cargo publish -p vex-llm || echo "Already published or error, continuing..."
      - run: sleep 30

      - name: Publish vex-anchor
        run: cargo publish -p vex-anchor || echo "Already published or error, continuing..."
      - run: sleep 30

      # Layer 3: Depends on vex-core + vex-queue (both published)
      - name: Publish vex-persist
        run: cargo publish -p vex-persist || echo "Already published or error, continuing..."
      - run: sleep 30

      # Layer 4: Depends on vex-core + vex-llm + vex-persist
      - name: Publish vex-temporal
        run: cargo publish -p vex-temporal || echo "Already published or error, continuing..."
      - run: sleep 30

      - name: Publish vex-adversarial
        run: cargo publish -p vex-adversarial || echo "Already published or error, continuing..."
      - run: sleep 30

      # Layer 5: Depends on vex-llm
      - name: Publish vex-router
        run: cargo publish -p vex-router || echo "Already published or error, continuing..."
      - run: sleep 30

      # Layer 6: Depends on vex-adversarial + vex-anchor + vex-persist + vex-llm
      - name: Publish vex-runtime
        run: cargo publish -p vex-runtime || echo "Already published or error, continuing..."
      - run: sleep 30

      # Layer 7: Top Level Gateway (depends on almost everything above)
      - name: Publish vex-api
        run: cargo publish -p vex-api || echo "Already published or error, continuing..."
      - run: sleep 30

      # Layer 8: Top Level Server & CLI
      - name: Publish vex-server
        run: cargo publish -p vex-server || echo "Already published or error, continuing..."
      - run: sleep 30

      - name: Publish vex-protocol-cli
        run: cargo publish -p vex-protocol-cli || echo "Already published or error, continuing..."
      - run: sleep 30

      - name: Publish vex-sidecar
        run: cargo publish -p vex-sidecar || echo "Already published or error, continuing..."

  build-attest:
    name: Build Attest Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [amd64, arm64]
        exclude:
          - os: windows-latest
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libtss2-dev pkg-config
      - name: Build Rust Core (Attest)
        run: |
          cd attest/attest-rs
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            rustup target add x86_64-pc-windows-gnu
            cargo build --release --target x86_64-pc-windows-gnu
          else
            cargo build --release
          fi
        shell: bash
      - name: Build Release Binary
        shell: bash
        run: |
          cd attest
          GOOS=${{ matrix.os == 'ubuntu-latest' && 'linux' || matrix.os == 'macos-latest' && 'darwin' || 'windows' }}
          GOARCH=${{ matrix.arch }}
          BINARY_NAME="attest-${GOOS}-${GOARCH}"
          if [ "$GOOS" = "windows" ]; then BINARY_NAME="${BINARY_NAME}.exe"; fi
          export CGO_ENABLED=1
          if [ "$GOOS" = "linux" ]; then
            export RUST_RELEASE_PATH="$(pwd)/attest-rs/target/release"
            export CGO_LDFLAGS="-L${RUST_RELEASE_PATH} -lattest_rs -lssl -lcrypto -ltss2-esys -ltss2-mu -ltss2-tctildr"
          elif [ "$GOOS" = "darwin" ]; then
            export RUST_RELEASE_PATH="$(pwd)/attest-rs/target/release"
            export CGO_LDFLAGS="-L${RUST_RELEASE_PATH} -lattest_rs -framework Security -framework CoreFoundation"
          else
            export RUST_RELEASE_PATH="$(pwd)/attest-rs/target/x86_64-pc-windows-gnu/release"
            export CGO_LDFLAGS="-L${RUST_RELEASE_PATH} -lattest_rs -lbcrypt -lws2_32 -luserenv -lntdll -lole32"
          fi
          go build -o ../"$BINARY_NAME" ./cmd/attest
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: attest-*
