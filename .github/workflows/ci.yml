name: CI

on:
  push:
    branches: [main, master, develop, feat/harden-vex-inspection]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gemini/**'
  pull_request:
    branches: [main, master, develop, feat/harden-vex-inspection]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gemini/**'

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout VEX
        uses: actions/checkout@v4
        with:
          path: vex
      - name: Checkout Attest
        uses: actions/checkout@v4
        with:
          repository: provnai/attest
          path: attest
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: vex

  clippy:
    name: Lint (Clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout VEX
        uses: actions/checkout@v4
        with:
          path: vex
      - name: Checkout Attest
        uses: actions/checkout@v4
        with:
          repository: provnai/attest
          path: attest
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install TPM dependencies
        run: sudo apt-get update && sudo apt-get install -y libtss2-dev pkg-config
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: vex

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout VEX
        uses: actions/checkout@v4
        with:
          path: vex
      - name: Checkout Attest
        uses: actions/checkout@v4
        with:
          repository: provnai/attest
          path: attest
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install TPM dependencies
        run: sudo apt-get update && sudo apt-get install -y libtss2-dev pkg-config
      - name: Run Tests
        run: cargo test --all-features --workspace
        working-directory: vex
