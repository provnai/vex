name: CI

on:
  push:
    branches: [main, master, develop, feat/harden-vex-inspection, experiment/magpie-titan-gate]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gemini/**'
  pull_request:
    branches: [main, master, develop, feat/harden-vex-inspection, experiment/magpie-titan-gate]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gemini/**'

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout VEX
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: Lint (Clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout VEX
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install TPM dependencies
        run: sudo apt-get update && sudo apt-get install -y libtss2-dev pkg-config
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout VEX
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install TPM dependencies
        run: sudo apt-get update && sudo apt-get install -y libtss2-dev pkg-config

      - name: Cache Magpie Binary
        id: cache-magpie
        uses: actions/cache@v4
        with:
          path: magpie-bin
          key: ${{ runner.os }}-magpie-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Magpie Compiler
        if: steps.cache-magpie.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/magpie-lang/magpie ../magpie
          cd ../magpie
          cargo build --release
          mkdir -p ${{ github.workspace }}/magpie-bin
          cp target/release/magpie ${{ github.workspace }}/magpie-bin/magpie

      - name: Run Tests
        env:
          MAGPIE_BIN_PATH: ${{ github.workspace }}/magpie-bin/magpie
        run: cargo test --all-features --workspace

  attest-lint:
    name: Lint (Attest/Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - name: Run linter
        env:
          CGO_LDFLAGS: "-L${{ github.workspace }}/target/debug"
        run: cd attest && golangci-lint run ./...

  attest-test:
    name: Test (Attest/Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install TPM dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libtss2-dev pkg-config
      - name: Build Rust Core (Attest)
        run: cd attest/attest-rs && cargo build
      - name: Run Tests
        env:
          CGO_LDFLAGS: "-L${{ github.workspace }}/target/debug"
        run: cd attest && go test -v -race ./...
